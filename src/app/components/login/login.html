<div class="auth-container">
  <!-- Background Glows -->
  <div class="bg-glow-gold" style="top: -10%; left: -10%;"></div>
  <div class="bg-glow-gold" style="bottom: -10%; right: -10%;"></div>

  <header class="auth-header">
    <div class="logo" [routerLink]="['/']">
      <span class="logo-icon"><i class="fa-solid fa-taxi"></i></span>
      <span class="logo-text">TRAFF<span class="logo-highlight">TAG</span></span>
    </div>
    <a [routerLink]="['/']" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  </header>

  <main class="auth-card-wrapper">
    <div class="glass-card auth-card">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p class="form-description">Enter your credentials to manage your vehicles and QR tags.</p>
      </div>

      <!-- Quick Demo Login Helper -->
      <div class="demo-helpers">
        <span class="demo-helper-title"><i class="fa-solid fa-wand-magic-sparkles"></i> Quick Demo Sign-In</span>
        <div class="demo-helper-buttons">
          <button type="button" class="btn-demo-fill" (click)="email.set('owner@example.com'); password.set('password123')">
            <i class="fa-solid fa-user"></i> Customer Demo
          </button>
          <button type="button" class="btn-demo-fill" (click)="email.set('admin@trafftag.com'); password.set('admin123')">
            <i class="fa-solid fa-key"></i> Admin Demo
          </button>
        </div>
      </div>

      <form (ngSubmit)="submitLogin()" #loginForm="ngForm" class="auth-form">
        
        <!-- Email Input -->
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper-inner">
            <span class="input-icon-left"><i class="fa-solid fa-envelope"></i></span>
            <input 
              type="email" 
              name="email" 
              [ngModel]="email()" 
              (ngModelChange)="email.set($event)"
              class="form-input form-input-with-icon" 
              placeholder="e.g. owner@example.com" 
              required
            />
          </div>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <div class="label-wrapper">
            <label class="form-label">Password</label>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>
          <div class="input-wrapper-inner">
            <span class="input-icon-left"><i class="fa-solid fa-lock"></i></span>
            <input 
              [type]="showPassword() ? 'text' : 'password'" 
              name="password" 
              [ngModel]="password()" 
              (ngModelChange)="password.set($event)"
              class="form-input form-input-with-icon" 
              placeholder="••••••••" 
              required
            />
            <button 
              type="button" 
              class="btn-toggle-password" 
              (click)="togglePasswordVisibility()"
              aria-label="Toggle password visibility"
            >
              <i class="fa-solid" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
            </button>
          </div>
        </div>

        <!-- Error Alert -->
        @if (errorMessage()) {
          <div class="error-alert">
            <span><i class="fa-solid fa-triangle-exclamation"></i></span>
            <p>{{ errorMessage() }}</p>
          </div>
        }

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn btn-primary btn-submit" 
          [disabled]="isSubmitting()"
        >
          @if (isSubmitting()) {
            <span class="spinner"></span> Signing In...
          } @else {
            Sign In
          }
        </button>

      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a [routerLink]="['/register']" class="auth-switch-link">Create one free</a></p>
      </div>
    </div>
  </main>

  <footer class="auth-footer-note">
    <p>&copy; 2026 TRAFFTAG. Secure Access Console.</p>
  </footer>
</div>
