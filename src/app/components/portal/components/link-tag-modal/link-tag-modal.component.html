@if (show) {
  <div class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Activate Sticker QR Code</h2>
        <button class="modal-close" (click)="close.emit()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <form (submit)="$event.preventDefault(); submit.emit()">
          <div class="form-group">
            <label for="serial-code">Sticker Serial / QR Code ID *</label>
            <input id="serial-code" type="text" placeholder="e.g. TT-718-204" [ngModel]="linkSerial" (ngModelChange)="linkSerialChange.emit($event)" name="serial" required>
          </div>
          
          @if (qrImageBase64) {
            <div class="qr-preview-container" style="display: flex; flex-direction: column; align-items: center; margin: 15px 0; padding: 15px; border-radius: 12px; background: rgba(15, 23, 42, 0.03); border: 1px dashed rgba(99, 102, 241, 0.3);">
              <span class="preview-label" style="font-size: 0.85rem; color: #475569; margin-bottom: 8px; font-weight: 600;"><i class="fa-solid fa-image"></i> Generated QR Decal Preview</span>
              <img [src]="qrImageBase64" alt="QR Decal Preview" style="width: 130px; height: 130px; border-radius: 8px; border: 2px solid #6366f1; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);" />
            </div>
          }
          <div class="form-group">
            <label for="vehicle-select">Select Vehicle *</label>
            <select id="vehicle-select" [ngModel]="linkVehicleId" (ngModelChange)="linkVehicleIdChange.emit($event)" name="vehicle" required>
              <option value="">-- Choose registered vehicle --</option>
              @for (v of vehicles; track v.id) {
                <option [value]="v.id">{{ v.make }} {{ v.model }} ({{ v.plate }})</option>
              }
            </select>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="close.emit()">Cancel</button>
            <button type="submit" class="btn btn-primary">Link & Activate Sticker</button>
          </div>
        </form>
      </div>
    </div>
  </div>
}
